<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>ch12-1-2以標籤script在網頁中加入JavaScript</title>
    <meta charset="utf-8">
    <style>
        div {
            width: 400px;
            border: 1px red solid;
            margin: 10px;
        }
    </style>
<script src="12-1-2.js"></script>
</head>

<body>
    <div>
        <p id="js1">這些文字不會出現</p>
    </div>
    <div>
        <p id="js2">按下按鈕顯示隱藏此段文字</p>
        <button type="button" onclick=hide()>點選隱藏文字</button>
        <button type="button" onclick=show()>點選顯示文字</button>
    </div>
</body>

</html>
